name: ⬇️ Universal Downloader (YouTube + Files)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Download links (separate with spaces)'
        required: true
        type: string
      mode:
        description: 'Packaging mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: 'Zip password (optional)'
        required: false
        default: ''
        type: string
      quality:
        description: 'YouTube video quality'
        required: false
        default: 'best'
        type: choice
        options:
          - 'best'
          - '1080p'
          - '720p'
          - '480p'
          - '360p'
          - 'audio only'
      subs:
        description: 'Download subtitles (YouTube only)'
        required: false
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

env:
  SPLIT_THRESHOLD_MB: 200

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "Git configured"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip curl bc ffmpeg python3-pip
          pip3 install yt-dlp
          echo "Dependencies installed"

      - name: Download files
        run: |
          set -e

          MODE="${{ github.event.inputs.mode }}"
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          QUALITY="${{ github.event.inputs.quality }}"
          SUBS="${{ github.event.inputs.subs }}"
          SPLIT_THRESHOLD_MB=${{ env.SPLIT_THRESHOLD_MB }}
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          BACKUP_DIR="/tmp/download_backup_$$"

          mkdir -p "$BACKUP_DIR" downloads tmp_downloads
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt

          # ---- Helper functions ----
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          # ---- YouTube downloader ----
          download_youtube() {
            local URL="$1"
            local OUTPUT_DIR="tmp_downloads"

            # Resolve Google redirect links
            if [[ "$URL" == *"google.com"* ]]; then
              echo "→ Detected Google redirect link, resolving..."
              URL=$(curl -Ls -o /dev/null -w '%{url_effective}' "$URL")
              echo "→ Resolved to: $URL"
            fi

            # Quality selection
            case "$QUALITY" in
              "best")       FORMAT_OPT="bestvideo+bestaudio/best" ;;
              "1080p")      FORMAT_OPT="bestvideo[height<=1080]+bestaudio/best[height<=1080]" ;;
              "720p")       FORMAT_OPT="bestvideo[height<=720]+bestaudio/best[height<=720]" ;;
              "480p")       FORMAT_OPT="bestvideo[height<=480]+bestaudio/best[height<=480]" ;;
              "360p")       FORMAT_OPT="bestvideo[height<=360]+bestaudio/best[height<=360]" ;;
              "audio only") FORMAT_OPT="bestaudio/best" ;;
              *)            echo "Unknown quality, defaulting to best"; FORMAT_OPT="best" ;;
            esac

            CMD="yt-dlp --format '$FORMAT_OPT' --merge-output-format mp4 --output '$OUTPUT_DIR/%(title)s.%(ext)s'"
            if [ "$SUBS" = "yes" ]; then
              CMD="$CMD --write-subs --sub-lang all --embed-subs"
            fi
            CMD="$CMD '$URL'"
            echo "→ Running: $CMD"
            eval "$CMD" || {
              echo "⚠️ yt-dlp failed, trying direct download with aria2c..."
              download_direct "$URL"
            }
          }

          # ---- Generic downloader (original logic, enhanced) ----
          download_direct() {
            local URL="$1"
            local FILENAME=$(basename "$URL" | sed 's/%20/ /g' | sed 's/%2F/-/g' | sed 's/[?#].*//')
            FILENAME=$(echo "$FILENAME" | sed 's/[<>:"|?*]/_/g')
            echo "→ Downloading $FILENAME"

            rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"
            aria2c --split=2 --max-connection-per-server=2 --min-split-size=20M \
              --max-tries=3 --retry-wait=5 --timeout=60 --connect-timeout=30 \
              --follow-torrent=false --check-certificate=false --allow-overwrite=true \
              --auto-file-renaming=false --dir="tmp_downloads" --out="$FILENAME" "$URL" \
              || curl -L -f -# --retry 3 --retry-delay 5 --connect-timeout 30 --max-time 3600 \
              -A "Mozilla/5.0" -o "tmp_downloads/$FILENAME" "$URL"
          }

          # ---- Main loop ----
          for URL in $URLS; do
            if [[ "$URL" == *"youtube.com"* ]] || [[ "$URL" == *"youtu.be"* ]] || [[ "$URL" == *"google.com"* ]]; then
              download_youtube "$URL"
            else
              download_direct "$URL"
            fi
          done

          # ---- Packaging ----
          if [ "$MODE" = "zip" ]; then
            echo "→ Creating zip archives (${SPLIT_THRESHOLD_MB} MB parts)..."
            ARCHIVE_BASE="$BACKUP_DIR/archive_$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$ARCHIVE_BASE"
            if [ -n "$ZIP_PASSWORD" ]; then
              zip -j -P "${ZIP_PASSWORD}" -s ${SPLIT_THRESHOLD_MB}m "${ARCHIVE_BASE}/archive.zip" tmp_downloads/*
            else
              zip -j -s ${SPLIT_THRESHOLD_MB}m "${ARCHIVE_BASE}/archive.zip" tmp_downloads/*
            fi
            cp -r "$ARCHIVE_BASE" downloads/
          else
            echo "→ Moving files (split if > ${SPLIT_THRESHOLD_MB} MB)..."
            for f in tmp_downloads/*; do
              [ -f "$f" ] || continue
              SIZE=$(stat -c%s "$f")
              BASENAME=$(basename "$f")
              FOLDER="$BACKUP_DIR/${BASENAME%.*}"
              mkdir -p "$FOLDER"
              if [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                zip -j -s ${SPLIT_THRESHOLD_MB}m "${FOLDER}/${BASENAME%.*}.zip" "$f"
              else
                cp "$f" "$FOLDER/"
              fi
            done
            cp -r "$BACKUP_DIR"/* downloads/ 2>/dev/null || true
          fi

          rm -rf tmp_downloads

      - name: Push to repository
        run: |
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          if [ -d "$BACKUP_DIR" ] && [ "$(ls -A $BACKUP_DIR 2>/dev/null)" ]; then
            mkdir -p downloads
            cp -r "$BACKUP_DIR"/* downloads/
          fi
          git add downloads/ || true
          git commit -m "📥 New download(s) [skip ci]" || true
          git push || true

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/backup_dir_path.txt /tmp/download_backup_*
